<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товарний Облік</title>

  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="app">

    <!-- СТОРІНКИ -->
    <main id="pages">

      <section id="home" class="page active">
        <h1>Головна</h1>
        <div id="stats"></div>
      </section>

      <section id="stock" class="page">
        <h1>Наявність</h1>
        <div id="stockList"></div>
      </section>

      <section id="add" class="page">
        <h1>Додати товар</h1>

        <input type="text" id="name" placeholder="Назва товару">

        <input type="number" id="cost" placeholder="Собівартість">

        <select id="availability">
          <option>В наявності</option>
          <option>В доставці з Китаю</option>
        </select>

        <input type="number" id="price" placeholder="Ціна продажу">

        <input type="file" id="photo" accept="image/*" capture="environment">

        <button class="glass-btn" onclick="addProduct()">Зберегти</button>
      </section>

      <section id="history" class="page">
        <h1>Історія</h1>
        <div id="historyList"></div>
      </section>

      <section id="income" class="page">
        <h1>Дохід</h1>
        <div id="incomeStats"></div>
      </section>

    </main>

    <!-- НИЖНІЙ БАР -->
    <nav class="bottom-nav">
      <button onclick="showPage('home')" class="nav-btn active">Головна</button>
      <button onclick="showPage('stock')" class="nav-btn">Наявність</button>
      <button onclick="showPage('add')" class="nav-btn">Додати</button>
      <button onclick="showPage('history')" class="nav-btn">Історія</button>
      <button onclick="showPage('income')" class="nav-btn">Дохід</button>
    </nav>

  </div>

  <script src="js/supabase.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
